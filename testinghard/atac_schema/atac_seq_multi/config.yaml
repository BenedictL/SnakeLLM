# SnakeLLM — Pipeline configuration
# Pipeline: atac-seq
# Edit paths and parameters before running

# Sample names — edit to match your actual sample IDs
samples:
  - sample1
  - sample2
  - sample3
  - sample4

# Reference files — update paths for your system
genome_build: "hg38"
bowtie2_index: "resources/hg38/bowtie2_index/hg38"
effective_genome_size: 2747877777
macs2_genome_size: "hs"

# Statistical thresholds
mapq_threshold: 30
min_read_length: 20
fdr_threshold: 0.05
fold_change_threshold: 1.0

# Pipeline parameters
conditions: {'treatment': ['sample1', 'sample2'], 'control': ['sample3', 'sample4']}
paired_end: True
strandedness: 0
blacklist_bed: "resources/hg38/hg38-blacklist.v2.bed"
tss_bed: "resources/hg38/hg38_tss.bed"
txdb: "TxDb.Hsapiens.UCSC.hg38.knownGene"
organism_db: "org.Hs.eg.db"
diffbind_samplesheet: "resources/diffbind_samplesheet.csv"
macs2_qvalue: 0.05