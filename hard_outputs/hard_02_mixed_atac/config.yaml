# SnakeLLM config
# Pipeline: atac-seq

# Samples
samples:
  - sample1
  - sample2
  - sample3
  - sample4

# Reference files
bowtie2_index: "resources/genome/hg38"
macs2_genome_size: "hs"
effective_genome_size: 2747877777
genome_build: "hg38"

# Thresholds
idr_threshold: 0.05
fdr_cutoff: 0.05
fc_cutoff: 1.5
mapq_threshold: 30
peak_calling_pvalue: 0.01

# Parameters