# SnakeLLM config
# Pipeline: chip-seq

# Samples
samples:
  - H3K4me3_rep1
  - H3K4me3_rep2
  - H3K27ac_rep1
  - H3K27ac_rep2
  - H3K27me3_rep1
  - H3K27me3_rep2
  - Input_rep1
  - Input_rep2

# Reference files
genome_build: "hg38"
bowtie2_index: "resources/bowtie2_index/genome"
adapters: "resources/adapters.fa"
genome_size: "hs"

# Thresholds
mapq_threshold: 20
idr_threshold: 0.05

# Parameters