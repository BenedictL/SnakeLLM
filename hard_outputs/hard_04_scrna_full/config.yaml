# SnakeLLM config
# Pipeline: scrna-seq-advanced

# Samples
samples:
  - sample1
  - sample2
  - sample3

# Reference files
cellranger_reference: "resources/refdata-gex-GRCh38-2020-A"
scale_factor: 10000
singler_reference: "HumanPrimaryCellAtlasData"
singler_annotation_level: "label.main"

# Thresholds
soupx_contamination_fraction: auto
min_features: 200
max_features: 6000
min_counts: 500
max_counts: 50000
max_mito_pct: 20
umap_min_dist: 0.3
marker_logfc_threshold: 0.25
marker_min_pct: 0.1

# Parameters