# SnakeLLM config
# Pipeline: scrna-seq

# Samples
samples:
  - sample1
  - sample2
  - sample3

# Reference files
genome_dir: "resources/star_genome"
scale_factor: 10000
singler_reference: "HumanPrimaryCellAtlasData"
ref_condition: "control"

# Thresholds
min_cells: 3
min_features: 200
max_features: 6000
max_mt_pct: 20
logfc_threshold: 0.25
min_pct: 0.1
fdr_threshold: 0.05
lfc_threshold: 1.0

# Parameters