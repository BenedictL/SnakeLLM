# SnakeLLM config
# Pipeline: atac-seq

# Samples
samples:
  - sample1_rep1
  - sample1_rep2
  - sample2_rep1
  - sample2_rep2

# Reference files
genome_build: "hg38"
bowtie2_index: "resources/bowtie2_index/hg38"
nextera_adapters: "resources/NexteraPE-PE.fa"
macs2_genome_size: "hs"
effective_genome_size: 2747877777

# Thresholds
mapq_threshold: 30
idr_threshold: 0.05

# Parameters