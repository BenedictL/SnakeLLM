# SnakeLLM config
# Pipeline: rna-seq-de

# Samples
samples:
  - S1
  - S2
  - S3
  - S4
  - S5
  - S6

# Reference files
genome_build: "mm10"
star_genome_dir: "resources/star_genome_mm10"
gtf: "resources/annotation/mm10.gtf"
adapters: "resources/adapters.fa"
reference_level: "control"

# Thresholds
fdr_threshold: 0.05
logfc_threshold: 1.0
pvalue_cutoff: 0.05
qvalue_cutoff: 0.2

# Parameters