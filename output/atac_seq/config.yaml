# SnakeLLM config
# Pipeline: atac-seq

# Samples
samples:
  - sample1
  - sample2

# Reference files
genome: "hg38"
bowtie2_index: "resources/genome/bowtie2_index"
nextera_adapters: "resources/NexteraPE-PE.fa"
tss_file: "resources/tss.bed"
effective_genome_size: 2700000000
macs2_genome_size: "hs"
homer_genome: "hg38"

# Thresholds
idr_threshold: 0.05
mapq_threshold: 30
min_read_length: 36

# Parameters